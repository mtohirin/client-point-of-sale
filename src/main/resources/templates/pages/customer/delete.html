<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>delete - customer</title>
</head>
<body>
<h1>Delete Customer</h1>
<form th:action="@{~/customer/delete}" method="post">
    <input type="hidden" name="id" th:value="${customer.id}">

    <label for="name">Name</label>
    <input id="name" type="text" name="name" th:value="${customer.name}"><br>

    <label for="email">Email</label>
    <input id="email" type="email" name="email" th:value="${customer.email}"><br>

    <label for="phone">Phone</label>
    <input id="phone" type="text" name="phone" th:value="${customer.phone}"><br>

    <label for="address">Address</label>
    <input id="address" type="text" name="address" th:value="${customer.address}"><br>

    <button type="submit">Delete</button>
    <button>
        <a th:href="@{~/customer}">Back</a>
    </button>
</form>
</body>
</html>
