<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>index - category</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
<h1>Index Category</h1>
<button><a th:href="@{~/category/add}">Add Category</a></button>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Action</th>
    </tr>
    </thead>
    <body>
    <tr th:each="category :${data}">
        <td th:text="${category.id}"></td>
        <td th:text="${category.name}"></td>
        <td>
            <a th:href="@{/category/edit/{id}(id=${category.id})}">EDIT</a>
            <a th:href="@{/category/delete/{id}(id=${category.id})}">DELETE</a>
            <a th:href="@{/category/detail/{id}(id=${category.id})}">DETAIL</a>

        </td>
    </tr>
    </body>
</table>
</body>
</html>
