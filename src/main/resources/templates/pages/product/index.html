<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>index - product</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
<h1>Index Product</h1>
<button><a th:href="@{~/product/add}">Add Product</a></button>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Category</th>
        <th>Action</th>
    </tr>
    </thead>
    <body>
    <tr th:each="product : ${data}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.stock}"></td>
        <td th:text="${product.category.getName()}"></td>

        <td>
            <a th:href="@{/product/edit/{id} (id=${product.id})}">EDIT</a>
            <a th:href="@{/product/delete/{id} (id=${product.id})}">DELETE</a>
            <a th:href="@{/product/detail/{id} (id=${product.id})}">DETAIL</a>
        </td>
    </tr>
    </body>
</table>
</body>
</html>
